[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan config:clear && php artisan route:clear && php artisan cache:clear && php artisan migrate --force && php artisan storage:link && php -S 0.0.0.0:$PORT -t public"